<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unity StreamGrab</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="landing">

    <!-- Noise texture overlay -->
    <div class="noise"></div>

    <!-- Background grid -->
    <div class="bg-grid"></div>

    <!-- Glow orb -->
    <div class="glow-orb"></div>

    <div class="hero">

        <div class="brand-badge">
            <span class="dot"></span>
            <span>Unity StreamGrab</span>
        </div>

        <h1 class="hero-title">
            Download<br>
            <span class="accent">Anything.</span><br>
            Instantly.
        </h1>

        <p class="hero-sub">
            High-quality video & audio downloads.<br>
            No ads. No fluff. Just results.
        </p>

        <div class="features">
            <div class="feature-pill">MP4 Video</div>
            <div class="feature-pill">MP3 Audio</div>
            <div class="feature-pill">Fast & Free</div>
        </div>

        <a href="/app" class="cta">
            <span>Start Downloading</span>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        </a>

        <p class="disclaimer">Supports YouTube & more platforms</p>
    </div>

</body>
</html>
